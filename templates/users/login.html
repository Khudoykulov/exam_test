{% extends 'base.html' %}

{% block title %}Kirish - TestPlatforma{% endblock %}

{% block content_auth %}
<div style="width:100%;max-width:440px;">
    <div style="text-align:center;margin-bottom:2rem;">
        <div style="width:64px;height:64px;background:var(--primary);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
            <i class="fas fa-graduation-cap" style="font-size:1.8rem;color:white;"></i>
        </div>
        <h1 style="font-size:1.6rem;margin-bottom:0.25rem;">TestPlatforma</h1>
        <p style="color:var(--gray-500);font-size:0.9rem;">Tizimga kirish</p>
    </div>

    <div class="card" style="padding:2rem;">
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="username"><i class="fas fa-user" style="margin-right:0.4rem;color:var(--gray-400);"></i>Foydalanuvchi nomi</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="username kiriting" required autofocus>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock" style="margin-right:0.4rem;color:var(--gray-400);"></i>Parol</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="parol kiriting" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem;">
                <i class="fas fa-sign-in-alt"></i> Kirish
            </button>
        </form>

        <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--gray-200);">
            <p style="color:var(--gray-500);font-size:0.9rem;">
                Hisobingiz yo'qmi?
                <a href="{% url 'users:register' %}" style="color:var(--primary);font-weight:600;text-decoration:none;">Ro'yxatdan o'tish</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
